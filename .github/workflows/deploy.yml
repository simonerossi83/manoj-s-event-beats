# .github/workflows/deploy.yml
name: Deploy to Tophost

on:
  push:
    branches:
      - main  # o master, il tuo branch principale
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER || secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME || secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ${{ secrets.FTP_PROTOCOL || 'ftp' }}
          port: ${{ secrets.FTP_PORT || 21 }}
          security: ${{ secrets.FTP_SECURITY || 'loose' }}
          log-level: verbose
          local-dir: ./dist/
          server-dir: /htdocs/  # o la cartella root del tuo dominio su Tophost
          state-name: .ftp-deploy-sync-state.json