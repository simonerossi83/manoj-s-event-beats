# .github/workflows/deploy.yml
name: Deploy to Tophost

on:
  push:
    branches:
      - main  # o master, il tuo branch principale
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy via FTP (lftp)
        env:
          FTP_HOST: ${{ secrets.FTP_SERVER || secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USERNAME || secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_PROTOCOL: ${{ secrets.FTP_PROTOCOL }}
          REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR || '/htdocs/' }}
        run: |
          test -n "$FTP_HOST" || (echo "Missing secret: FTP_SERVER or FTP_HOST" && exit 1)
          test -n "$FTP_USER" || (echo "Missing secret: FTP_USERNAME or FTP_USER" && exit 1)
          test -n "$FTP_PASS" || (echo "Missing secret: FTP_PASSWORD" && exit 1)

          PORT="${FTP_PORT:-21}"
          PROTOCOL="${FTP_PROTOCOL:-ftp}"

          if [ "$PROTOCOL" = "ftps" ]; then
            SSL_FORCE="true"
          else
            SSL_FORCE="false"
          fi

          lftp -d -u "$FTP_USER","$FTP_PASS" "$FTP_HOST" -p "$PORT" <<EOF
          set cmd:fail-exit true
          set net:max-retries 3
          set net:reconnect-interval-base 5
          set net:timeout 20
          set dns:order inet
          set ftp:passive-mode true
          set ftp:prefer-epsv false
          set ftp:ssl-allow true
          set ftp:ssl-force $SSL_FORCE
          set ftp:ssl-protect-data $SSL_FORCE
          set ssl:verify-certificate false
          mirror --reverse --delete --verbose ./dist/ "$REMOTE_DIR"
          bye
          EOF