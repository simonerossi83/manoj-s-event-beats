<html lang="en">

    <title>manoy's Event Beats</title>
    <script>
      // GitHub Pages SPA trick: store the current URL in sessionStorage
      // and redirect to the base index.html, which will restore the URL.
      sessionStorage.redirect = location.href;
      var basePath = '/manoy-s-event-beats';
      location.replace(location.protocol + '//' + location.hostname + (location.port ? ':' + location.port : '') + basePath + '/');
    </script>
  </head>

</html>
